---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: eevee-crds
  namespace: flux-system
spec:
  interval: 10m
  targetNamespace: eevee-bot
  install:
    createNamespace: true
    crds: CreateReplace
  chart:
    spec:
      chart: crds
      sourceRef:
        kind: HelmRepository
        name: eevee
        namespace: flux-system
      interval: 10m
  values: {}
