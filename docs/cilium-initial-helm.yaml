# deploy as such
# helm upgrade --install cilium cilium/cilium --values cilium-initial-helm.yaml --namespace kube-system --version 1.18.0

---

cni:
  exclusive: false
kubeProxyReplacement: true
operator:
  replicas: 1
k8sServiceHost: "rke2.ny.eevee.bot"
k8sServicePort: 6443
routingMode: tunnel
tunnelProtocol: geneve
bpfClockProbe: true
loadBalancer:
  mode: dsr
  dsrDispatch: geneve
bpf:
  datapathMode: netkit
  masquerade: true
  preallocateMaps: true
  distributedLRU:
    enabled: true
  mapDynamicSizeRatio: 0.08
pmtuDiscovery:
  enabled: true
rollOutCiliumPods: true
sctp:
  enabled: true
hubble:
  enabled: false
  relay:
    enabled: false
encryption:
  enabled: true
  type: wireguard
socketLB:
  enabled: true
externalIPs:
  enabled: true
hostPort:
  enabled: true
nodePort:
  enabled: true
l2announcements:
  enabled: true
ipv4NativeRoutingCIDR: ""
ipv6NativeRoutingCIDR: ""
enableIPv4Masquerade: true
enableIPv6Masquerade: false
ipv4:
  enabled: true
ipv6:
  enabled: false
endpointRoutes:
  enabled: true
envoy:
  enabled: false
ipam:
  mode: multi-pool
  operator:
    autoCreateCiliumPodIPPools:
      default:
        ipv4:
          cidrs:
            - "172.16.0.0/16"
          maskSize: 24
